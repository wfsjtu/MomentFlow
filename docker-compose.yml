version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: momentflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: momentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - momentflow-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: momentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - momentflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  momentflow-network:
    driver: bridge
